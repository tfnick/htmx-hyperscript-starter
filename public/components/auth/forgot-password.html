<div class="auth-container">
  <h3>找回密码</h3>
  <p>输入您的注册邮箱，我们将发送重置链接。</p>
  <form hx-post="/api/auth/forgot-password" hx-target="#forgot-result" hx-swap="innerHTML">
    <label>
      邮箱
      <input type="email" name="email" placeholder="your@email.com" required />
    </label>
    <button type="submit">发送重置链接</button>
  </form>
  <div id="forgot-result"></div>
  <div class="auth-links">
    <a href="/login.html">返回登录</a>
  </div>
</div>

<style>
  .auth-container {
    max-width: 400px;
    margin: 2rem auto;
    padding: 1.5rem;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .auth-links {
    margin-top: 1rem;
    font-size: 0.9rem;
  }
</style>
