<div class="auth-container">
  <h3>重置密码</h3>
  <form hx-post="/api/auth/reset-password" hx-target="#reset-result" hx-swap="innerHTML"
    _="on htmx:afterSettle check if event.detail.xhr.status === 200 then window.location.href = '/login.html'">
    <input type="hidden" name="token" id="reset-token" />
    <label>
      新密码
      <input type="password" name="password" placeholder="至少6位" required />
    </label>
    <button type="submit">确认重置</button>
  </form>
  <div id="reset-result"></div>
</div>

<style>
  .auth-container {
    max-width: 400px;
    margin: 2rem auto;
    padding: 1.5rem;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
</style>

<script>
  // 从 URL 获取 token 并填入表单
  document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
      document.getElementById('reset-token').value = token;
    }
  });
</script>
